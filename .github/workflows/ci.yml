name: CI/CD Pipeline - Análisis de Métricas de Calidad

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [ 21 ]

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3

    - name: 🔧 Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'oracle'

    - name: 🏗️ Build and Test with Maven
      run: mvn clean install -DskipTests
      
    - name: 🧪 Run Unit Tests
      run: mvn test

    - name: 📊 Generate Quality Metrics
      run: mvn verify
      continue-on-error: true

    - name: 📈 Display JaCoCo Coverage Report
      run: |
        echo "=== JaCoCo Coverage Report ==="
        if [ -f target/site/jacoco/jacoco.csv ]; then
          cat target/site/jacoco/jacoco.csv
        fi

    - name: 🔍 Display PMD Report
      run: |
        echo "=== PMD Analysis Report ==="
        if [ -f target/pmd.xml ]; then
          echo "PMD violations found:"
          grep -o '<violation' target/pmd.xml | wc -l
          echo "violations total"
          echo ""
          echo "Detailed PMD violations:"
          grep '<violation' target/pmd.xml | head -20
        fi

    - name: ✅ Display Checkstyle Report
      run: |
        echo "=== Checkstyle Analysis Report ==="
        if [ -f target/checkstyle-result.xml ]; then
          echo "Checkstyle violations found:"
          grep -o '<error' target/checkstyle-result.xml | wc -l
          echo "violations total"
          echo ""
          echo "Sample violations:"
          grep '<error' target/checkstyle-result.xml | head -10
        fi

    - name: 📁 Upload JaCoCo Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: jacoco-report
        path: target/site/jacoco/
        retention-days: 30

    - name: 📁 Upload PMD Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: pmd-report
        path: target/pmd.xml
        retention-days: 30

    - name: 📁 Upload Checkstyle Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: checkstyle-report
        path: target/checkstyle-result.xml
        retention-days: 30

    - name: 📝 Generate Summary Comment
      if: always()
      run: |
        echo "## 📊 Métricas de Calidad - Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ Pipeline Ejecutado Exitosamente" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Etapas completadas:**" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Construcción del proyecto" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Ejecución de tests unitarios" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Generación de métricas JaCoCo" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Análisis PMD" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Análisis Checkstyle" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 Artefactos Disponibles" >> $GITHUB_STEP_SUMMARY
        echo "- JaCoCo Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "- PMD Analysis Report (XML)" >> $GITHUB_STEP_SUMMARY
        echo "- Checkstyle Report (XML)" >> $GITHUB_STEP_SUMMARY

      - name: Subir reporte PMD
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pmd-report
          if-no-files-found: warn
          path: |
            target/site/pmd.html
            target/pmd.xml